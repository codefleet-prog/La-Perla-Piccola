<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adminisztráció | La Perla Piccola</title>
    <!-- Fonts from the main site -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Inter:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

    <!-- ==================== LOGIN VIEW ==================== -->
    <div id="login-view" class="view-container">
        <div class="login-card">
            <div class="login-logo">La <em>Perla</em> Piccola</div>
            <h1 class="login-title">Adminisztrációs portál</h1>
            <p class="login-desc">Kérjük, jelentkezzen be a kennel kezeléséhez.</p>
            
            <form id="login-form">
                <div class="field">
                    <label>Email cím</label>
                    <input type="email" id="login-email" required placeholder="admin@laperlapiccola.hu">
                </div>
                <div class="field">
                    <label>Jelszó</label>
                    <input type="password" id="login-password" required placeholder="••••••••">
                </div>
                <div id="login-error" class="error-msg" style="display:none;">Helytelen email vagy jelszó.</div>
                <button type="submit" class="btn-solid-gold">Bejelentkezés</button>
            </form>
            <a href="index.html" class="back-link">← Vissza a főoldalra</a>
        </div>
    </div>

    <!-- ==================== DASHBOARD VIEW ==================== -->
    <div id="dashboard-view" class="view-container" style="display: none;">
        <aside class="sidebar">
            <div class="sidebar-brand">La <em>Perla</em> Admin</div>
            <nav class="sidebar-nav">
                <button class="nav-item active" data-view="puppies-view">🐾 Kölykök kezelése</button>
                <button class="nav-item" data-view="gallery-view">📸 Galéria kezelése</button>
            </nav>
            <div class="sidebar-bottom">
                <button id="logout-btn" class="nav-item">Kilépés</button>
            </div>
        </aside>

        <main class="main-content">
            
            <!-- ====== PUPPIES VIEW ====== -->
            <div id="puppies-view" class="dashboard-section">
                <header class="main-header">
                <h2>Kölykök kezelése</h2>
                <div class="header-actions">
                    <select id="sort-select" class="sort-select">
                        <option value="default">Alapértelmezett sorrend</option>
                        <option value="name-asc">Név szerint (A-Z)</option>
                        <option value="name-desc">Név szerint (Z-A)</option>
                        <option value="age-asc">Kor szerint (Növekvő)</option>
                        <option value="age-desc">Kor szerint (Csökkenő)</option>
                    </select>
                    <button id="btn-add-puppy" class="btn-solid-gold">+ Új Kölyök Hozzáadása</button>
                </div>
            </header>

            <div class="table-container">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Kép</th>
                            <th>Név / Alom</th>
                            <th>Kor / Dátum</th>
                            <th>Státusz</th>
                            <th>Műveletek</th>
                        </tr>
                    </thead>
                    <tbody id="puppy-table-body">
                        <!-- Rows injected via JS -->
                    </tbody>
                </table>
            </div>
            </div> <!-- /#puppies-view -->

            <!-- ====== GALLERY VIEW ====== -->
            <div id="gallery-view" class="dashboard-section" style="display: none;">
                <header class="main-header">
                    <h2>Galéria kezelése</h2>
                    <div class="header-actions">
                        <div class="gallery-toggle" id="adminGalleryToggle">
                            <div class="gt-slider" id="adminGtSlider"></div>
                            <button class="gt-btn active" data-target="track-teljes">Teljes</button>
                            <button class="gt-btn" data-target="track-kiallitas">Kiállítások</button>
                        </div>
                    </div>
                </header>

                <div class="gallery-admin-container">
                    <!-- The tracks will be injected here dynamically by JS -->
                    <div class="gallery-tracks" id="adminGalleryTracks"></div>
                </div>
            </div> <!-- /#gallery-view -->

        </main>
    </div>

    <!-- ==================== PUPPY MODAL ==================== -->
    <div id="puppy-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <h3 id="modal-title">Új Kölyök Hozzáadása</h3>
                <button id="btn-close-modal" class="close-btn">×</button>
            </header>
            <form id="puppy-form">
                <input type="hidden" id="puppy-id">
                
                <div class="form-row">
                    <div class="field">
                        <label>Név / Alom</label>
                        <input type="text" id="p-name" required placeholder="Pl. Hazel Alom">
                    </div>
                    <div class="field">
                        <label>Születési Idő / Dátum</label>
                        <input type="text" id="p-date" required placeholder="Pl. 2025. Február">
                    </div>
                </div>

                <div class="form-row">
                    <div class="field">
                        <label>Kor Címke (Pl. 13 Hetes)</label>
                        <input type="text" id="p-age-label" required placeholder="13 Hetes">
                    </div>
                    <div class="field">
                        <label>Kor Szám (Nagy háttérszám)</label>
                        <input type="number" id="p-age-num" required placeholder="13">
                    </div>
                </div>

                <div class="form-row">
                    <div class="field">
                        <label>Státusz</label>
                        <select id="p-status">
                            <option value="available">Elérhető</option>
                            <option value="reserved">Foglalt</option>
                            <option value="planned">Tervezett</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Kép (Feltöltés VAGY URL)</label>
                        <div class="img-input-group">
                            <input type="file" id="p-image-file" accept="image/*" class="file-input" multiple>
                            <span class="img-or">vagy</span>
                            <input type="url" id="p-image" placeholder="Kép URL-ek (vesszővel elválasztva)">
                        </div>
                    </div>
                </div>

                <div class="field">
                    <label>Leírás</label>
                    <textarea id="p-desc" rows="3" required placeholder="Rövid leírás a kölyökről..."></textarea>
                </div>

                <div class="field">
                    <label>Címkék (Vesszővel elválasztva)</label>
                    <input type="text" id="p-tags" required placeholder="Kislány, Vörös-Fawn, FCI Pedigré">
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-cancel-modal" class="btn-outline">Mégsem</button>
                    <button type="submit" class="btn-solid-gold">Mentés</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ==================== GALLERY IMAGE MODAL ==================== -->
    <div id="gallery-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <header class="modal-header">
                <h3>Kép Szerkesztése</h3>
                <button id="btn-close-gallery-modal" class="close-btn">×</button>
            </header>
            <form id="gallery-form">
                <input type="hidden" id="g-track-id">
                <input type="hidden" id="g-image-id">
                
                <div class="gallery-preview-wrap">
                    <img id="g-preview-img" src="" alt="Előnézet">
                </div>

                <div class="form-row">
                    <div class="field">
                        <label>Kép (Feltöltés VAGY URL)</label>
                        <div class="img-input-group">
                            <input type="file" id="g-image-file" accept="image/*" class="file-input">
                            <span class="img-or">vagy</span>
                            <input type="url" id="g-image" placeholder="Kép URL (https://...)">
                        </div>
                    </div>
                    <div class="field">
                        <label>Képaláírás</label>
                        <input type="text" id="g-caption" required placeholder="Pl. Elegancia">
                    </div>
                </div>

                <div class="modal-actions">
                    <button type="button" id="btn-cancel-gallery-modal" class="btn-outline">Mégsem</button>
                    <button type="submit" class="btn-solid-gold">Mentés</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Supabase Setup -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="admin.js"></script>
</body>
</html>
